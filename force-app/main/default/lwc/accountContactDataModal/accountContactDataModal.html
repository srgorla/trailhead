<template>
    <lightning-card title="Account Contact Data (Modal)">
        <lightning-datatable 
            key-field="accId"
            data={accountData}
            columns={columns}
            onrowaction={handleRowAction}>
        </lightning-datatable>

        <template if:true={error}>
            <div class="slds-text-color_error">Error: {error.body.message}</div>
        </template>
    </lightning-card>
</template>
